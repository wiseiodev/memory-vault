pre-commit:
  commands:
    biome:
      run: pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: pnpm typecheck
    test:
      run: pnpm test
    build:
      run: pnpm build
